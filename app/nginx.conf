server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback — let React Router handle routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Proxy API calls to the API service. API_UPSTREAM is injected at runtime via envsubst.
  # Use a variable for proxy_pass so nginx resolves DNS per-request (Railway's
  # private network is IPv6-only and the api container may start after this one).
  resolver ${NGINX_RESOLVER} valid=30s ipv6=on;
  location /api/ {
    # Variable proxy_pass: drop the path part — nginx forwards $request_uri as-is.
    set $api_upstream "${API_UPSTREAM}";
    proxy_pass $api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
