# Local development stack. Run from repo root: `docker compose up`

services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: foodlab
    ports:
      - "5432:5432"
    volumes:
      - foodlab_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Bundled Ollama is opt-in. By default the api talks to a native Ollama
  # process on the host (much faster on macOS thanks to Metal GPU acceleration).
  # To run the bundled CPU-only Ollama instead:
  #   docker compose --profile bundled-ollama up -d
  ollama:
    profiles: ["bundled-ollama"]
    build:
      context: .
      dockerfile: ai/Dockerfile
    environment:
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    ports:
      - "11434:11434"
    volumes:
      - foodlab_ollama:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/foodlab
      # Defaults to the host's Ollama (`ollama serve` on the Mac). Override with
      # FOODLAB_OLLAMA_URL=http://ollama:11434 for the bundled-ollama profile.
      # We deliberately use FOODLAB_OLLAMA_URL (not OLLAMA_URL) so this isn't
      # clobbered by .env, which sets OLLAMA_URL=localhost for non-Docker runs.
      OLLAMA_URL: ${FOODLAB_OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      API_PORT: 3001
      RECIPES_DIR: /recipes
    extra_hosts:
      # Lets the container resolve the host on Linux too (no-op on Docker Desktop).
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        VITE_API_URL: ""
    environment:
      API_UPSTREAM: http://api:3001
    command: >
      /bin/sh -c "export NGINX_RESOLVER=$$(awk '/^nameserver/ {ip=$$2; if (ip ~ /:/) ip=\"[\"ip\"]\"; printf \"%s \", ip}' /etc/resolv.conf)
      && envsubst '$$API_UPSTREAM $$NGINX_RESOLVER' < /etc/nginx/conf.d/default.conf > /tmp/default.conf
      && mv /tmp/default.conf /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
    depends_on:
      - api
    ports:
      - "8080:8080"

volumes:
  foodlab_pg:
  foodlab_ollama:
